name: Elixir

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

env:
  MIX_ENV: test

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: 1.18.4
            otp: 27.3.4.3
          - elixir: 1.19.4
            otp: 28.4.2

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Cache Mix dependencies and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install Mix tools and dependencies
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check compile-time dependency cycles
        run: mix xref graph --label compile-connected --fail-above 0

      - name: Run tests
        run: mix test --warnings-as-errors

  dialyzer:
    runs-on: ubuntu-latest

    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: 1.18.4
          otp-version: 27.3.4.3

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Cache Dialyzer PLTs and Mix build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-dialyzer-1.18.4-27.3.4.3-${{ hashFiles('mix.exs', 'mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-1.18.4-27.3.4.3-

      - name: Install Mix tools and dependencies
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get

      - name: Run Dialyzer
        run: mix dialyzer
